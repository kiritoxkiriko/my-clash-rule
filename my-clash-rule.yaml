# mihomo (Clash Meta) 懒人配置
# 基于本仓库规则整理
# 参考配置:
# https://gist.githubusercontent.com/liuran001/5ca84f7def53c70b554d3f765ff86a33/raw/9de058af0600fbbcfb480f9cbc23bd7dafe9d039/config.yaml
# 修改自官方示例规则思路，并按本仓库 rules/*.list 拆分为 rule-providers
# 建议对照 Clash Meta / Mihomo 文档理解各配置项含义
# 不理解的地方不要乱动，如果你只是想直接用，请优先修改订阅链接和基础配置

# true 是启用
# false 是禁用

# 基础配置
# --------------------------------------------------
# 如果你只想快速使用，那么你只需要修改分割线以内与订阅相关的内容
# 其他部分保持不动即可

p: &p
  type: http
  # 自动更新订阅时间，单位为秒
  interval: 3600
  health-check:
    enable: true
    url: https://cp.cloudflare.com
    # 节点连通性检测时间，单位为秒
    interval: 300
    # 节点超时延迟，单位为毫秒
    timeout: 1000
    # 节点自动切换差值，单位为毫秒
    tolerance: 100

# 如果你需要使用大于两个机场，在下方 use 处继续添加订阅名，
# 然后在 proxy-providers 照例添加订阅链接即可。
# 反之，如果你只需要使用一个，那么将“订阅二”注释掉即可。
use: &use
  type: url-test
  use:
    - 订阅一
    - 订阅二
    # - 本地配置

# 订阅链接
# 对于订阅来说，path 为选填项，但建议启用。
# 本地配置可以只填 path。
proxy-providers:
  订阅一:
    <<: *p
    # path: ./proxy_provider/订阅一.yaml
    url: "https://example.com/airport?type=clashmeta"
    # 如需要为该订阅组节点添加前缀，取消下面两行注释
    # override:
    #   additional-prefix: "[订阅一]"

  订阅二:
    <<: *p
    # path: ./proxy_provider/订阅二.yaml
    url: "https://example.com/api/v1/client/subscribe?token=replace-me"
    # 如需要为该订阅组节点添加前缀，取消下面两行注释
    # override:
    #   additional-prefix: "[订阅二]"

  # 本地配置:
  #   <<: *p
  #   path: ./proxy_provider/本地配置.yaml
  #   如需要为该订阅组节点添加前缀，取消下面两行注释
  #   override:
  #     additional-prefix: "[本地配置]"

# 小白请不要继续随意修改以下设置
# 若需修改请参阅文档 https://wiki.metacubex.one
# --------------------------------------------------

# 规则订阅

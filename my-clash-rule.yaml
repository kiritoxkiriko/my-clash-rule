mode: rule
# ipv6 支持
ipv6: true
# 日志等级
# 建议默认为 info
# silent 静默，不输出任何内容，以此减少 CPU 占用
# error 仅输出发生错误至无法使用的日志
# warning 输出发生错误但不影响运行的日志，以及 error 级别内容
# info 输出一般运行的内容，以及 error 和 warning 级别内容
# debug 尽可能输出所有内容
log-level: info
# 允许局域网连接
allow-lan: true
# socks5/http 端口
mixed-port: 7890
# Meta 内核特性 https://wiki.metacubex.one/config/general
# 统一延迟
# 更换延迟计算方式,去除握手等额外延迟
unified-delay: true
# TCP 并发
# 同时对所有ip进行连接，返回延迟最低的地址
tcp-concurrent: true
# 外部控制端口
external-controller: :9090

geodata-mode: true

# --- Smart 内核专属设置（不使用 Smart 内核保持不动即可，切勿启用会导致无法正常启动）
# 文档: https://github.com/vernesong/OpenClash/releases/tag/mihomo
# 以下的配置项可以不启用，不启用则使用默认值
# 启用模型自动更新，默认值为 false
#lgbm-auto-update: true
# 模型自动更新间隔，默认值为 72（小时）
#lgbm-update-interval: 72
# 模型更新地址
#lgbm-url: "https://ghfast.top/https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin"
# --- Smart 内核专属设置结束

# Geo 数据库下载地址
# 源地址 https://github.com/MetaCubeX/meta-rules-dat
# 可以更换镜像站但不要更换其他数据库，可能导致无法启动
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

# 进程匹配模式
# 路由器上请设置为 off
# always 开启，强制匹配所有进程
# strict 默认，由 Clash 判断是否开启
# off 不匹配进程，推荐在路由器上使用此模式
find-process-mode: strict

# 缓解移动设备耗电问题
# https://github.com/vernesong/OpenClash/issues/2614
keep-alive-interval: 1800

# 全局客户端指纹
global-client-fingerprint: random # 随机指纹

# 自动同步时间以防止时间不准导致无法正常联网
ntp:
  enable: true
  # 是否同步至系统时间，需要 root/管理员权限
  write-to-system: false
  server: time.apple.com
  port: 123
  interval: 30

# 域名嗅探
sniffer:
  enable: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true

# tun 模式
tun:
  enable: false  # enable 'true'
  stack: system  # or 'gvisor'
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true

# dns 设置
# 已配置 ipv6
dns:
  enable: true
  listen: :1053
  ipv6: true
  # 路由器个人建议使用 redir-host 以最佳兼容性
  # 其他设备可以使用 fake-ip
  enhanced-mode: redir-host
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - "*"
    - "+.lan"
    - "+.local"
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
    - 114.114.114.114
    - "[2402:4e00::]"
    - "[2400:3200::1]"
  nameserver:
    - "tls://8.8.4.4#DNS"
    - "tls://1.0.0.1#DNS"
    - "tls://[2001:4860:4860::8844]#DNS"
    - "tls://[2606:4700:4700::1001]#DNS"
  proxy-server-nameserver:
    - https://doh.pub/dns-query
  nameserver-policy:
    "geosite:cn,apple,private":
      - system
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:!cn,!private": 
      - "tls://dns.google"
      - "tls://cloudflare-dns.com"

# 缓存
profile:
  store-selected: true
  store-fake-ip: true
  # --- Smart 内核专属设置
  # 数据收集文件大小，默认值为 100（MB）
  # 这个没有启用的必要
  #smart-collector-size: 100
  # --- Smart 内核专属设置结束

# 策略组
# 分组名称沿用 my-clash-rule.ini，方便与现有规则对应
# 如果你需要调整分流出口，优先修改下面各策略组的 proxies 顺序
proxy-groups:
  # 使用 WARP 的用户需要手动在下方的 proxies 字段内添加 WARP
  # 例如 [WARP, Proxy, Auto, HK, TW, JP, SG, US, KR, Manual, DIRECT]
  - name: AI
    type: select
    proxies:
      - Proxy
      - Auto
      - SG
      - HK
      - TW
      - JP
      - US
      - KR
      - Manual
      - Manul2
      - DIRECT

  - name: Games-Direct
    type: select
    proxies:
      - DIRECT
      - Proxy
      - Auto

  - name: Games-Proxy
    type: select
    proxies:
      - Proxy
      - Auto
      - Manual
      - Manul2
      - DIRECT

  - name: Dev-CN
    type: select
    proxies:
      - DIRECT
      - Proxy
      - Auto

  - name: Dev
    type: select
    proxies:
      - Manual
      - Manul2
      - SG
      - HK
      - TW
      - JP
      - US
      - KR
      - Proxy
      - Auto
      - DIRECT

  - name: Netflix
    type: select
    proxies:
      - SG
      - Proxy
      - Auto
      - HK
      - TW
      - JP
      - US
      - KR
      - Manual
      - Manul2
      - DIRECT

  - name: Disney
    type: select
    proxies:
      - SG
      - Proxy
      - Auto
      - HK
      - TW
      - JP
      - US
      - KR
      - Manual
      - Manul2
      - DIRECT

  - name: Video-TW
    type: select
    proxies:
      - TW
      - Proxy
      - Manual
      - Manul2
      - DIRECT

  - name: Video-US
    type: select
    proxies:
      - US
      - Proxy
      - Auto
      - Manual
      - Manul2
      - DIRECT

  - name: Video-JP
    type: select
    proxies:
      - JP
      - Proxy
      - Auto
      - Manual
      - Manul2
      - DIRECT

  - name: Video-Common
    type: select
    proxies:
      - Proxy
      - Auto
      - HK
      - TW
      - SG
      - JP
      - US
      - KR
      - Manual
      - Manul2
      - DIRECT

  - name: VRChat
    type: select
    proxies:
      - Proxy
      - Auto
      - Manual
      - Manul2
      - DIRECT

  - name: Direct
    type: select
    proxies:
      - DIRECT
      - Proxy
      - Auto

  - name: China
    type: select
    proxies:
      - DIRECT
      - Proxy
      - Auto

  - name: Ads
    type: select
    proxies:
      - REJECT
      - DIRECT

  # 这里的 Proxy 可以理解为主代理策略
  # 分隔,下面是节点选择相关分组，放在最后方便在客户端中集中查看
  - name: Proxy
    type: select
    proxies:
      - Auto
      - HK
      - TW
      - SG
      - JP
      - US
      - KR
      - Manual
      - Manul2
      - DIRECT

  - name: Final
    type: select
    proxies:
      - DIRECT
      - Proxy
      - Auto
      - Manual
      - Manul2

  # 这里的 DNS 指海外解析 DNS 走的节点，一般跟随主代理策略即可
  - name: DNS
    type: select
    proxies:
      - Proxy
      - Auto
      - DIRECT

  # 全部节点
  - name: Manual
    type: select
    include-all: true

  - name: Manul2
    type: select
    include-all: true

  # 自动选择
  - name: Auto
    <<: *use
    tolerance: 50

  # 分隔,下面是地区分组
  - name: HK
    <<: *use
    filter: "(?i)(港|hk|hong kong|hongkong)"

  - name: JP
    <<: *use
    filter: "(?i)(日本|jp|japan)"

  - name: US
    <<: *use
    filter: "(?i)(美|us|united states|unitedstates)"

  - name: TW
    <<: *use
    filter: "(?i)(台|tw|taiwan)"

  - name: SG
    <<: *use
    filter: "(?i)(新加坡|狮城|sg|singapore)"

  - name: KR
    <<: *use
    filter: "(?i)(韩|韓|kr|korea|kor|首尔)"

rules:
  # 若需禁用 QUIC 请取消注释 QUIC 两条规则
  # 防止 YouTube 等使用 QUIC 导致速度不佳, 禁用 443 端口 UDP 流量（不包括国内）
  # - AND,(AND,(DST-PORT,443),(NETWORK,UDP)),(NOT,((GEOSITE,cn))),REJECT
  # - AND,(AND,(DST-PORT,443),(NETWORK,UDP)),(NOT,((GEOIP,CN))),REJECT
  # 如需新增规则，请尽量放在更泛匹配规则之前
  - RULE-SET,vrchat,VRChat
  - RULE-SET,games-direct,Games-Direct
  - RULE-SET,games-proxy,Games-Proxy
  - RULE-SET,direct,Direct
  - RULE-SET,ads,Ads
  - RULE-SET,ai,AI
  - RULE-SET,netflix,Netflix
  - RULE-SET,disney,Disney
  - RULE-SET,video-tw,Video-TW
  - RULE-SET,video-us,Video-US
  - RULE-SET,video-jp,Video-JP
  - RULE-SET,video-common,Video-Common
  - RULE-SET,dev-cn,Dev-CN
  - RULE-SET,dev,Dev
  - RULE-SET,proxy,Proxy
  - RULE-SET,china,China
  # 绕过局域网地址
  - GEOIP,CN,Direct
  # 其他就是所有规则没匹配到的
  # 可以理解为 ACL4SSR 配置里的 漏网之鱼
  # 换言之，其他走代理就是绕过中国大陆地址，不走就是 GFWList 模式
  - MATCH,Final

# Stash compatibility version
# Docs:
# https://stash.wiki/en/proxy-protocols/proxy-providers
# https://stash.wiki/en/proxy-protocols/proxy-groups
# https://stash.wiki/en/rules/rule-set
# https://stash.wiki/en/features/dns-server

mode: rule
log-level: info
allow-lan: true
mixed-port: 7890

dns:
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  skip-cert-verify: true
  follow-rule: false

proxy-providers:
  订阅一:
    # 请替换为支持 Stash / Clash YAML 节点订阅的链接
    url: "https://example.com/airport?type=stash"
    interval: 86400

  # 订阅二:
  #   url: "https://example.com/airport?type=stash"
  #   interval: 86400


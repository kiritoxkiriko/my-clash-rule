# 覆写示例：只覆写 `订阅一`
#
# 用法：
# 1. 保持主配置使用 my-clash-rule.yaml
# 2. 在客户端的“覆写”功能中粘贴本文件内容
# 3. 把下面的 url 改成你自己的订阅链接

use:
  use:
    - 订阅一

proxy-providers:
  订阅一:
    url: "https://example.com/airport?type=clashmeta"
    # path: ./proxy_provider/订阅一.yaml
    # 如需要为该订阅组节点添加前缀，取消下面两行注释
    # override:
    #   additional-prefix: "[订阅一]"
